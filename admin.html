<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Адмінка — Масяня</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="admin.js" defer></script>
</head>
<body>
  <header class="site-header admin-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">Панель керування</p>
        <h1>Масяня — адмінка</h1>
      </div>
      <a class="admin-link" href="index.html">На сайт</a>
    </div>
  </header>

  <main class="page-shell admin-shell">
    <section id="authPanel" class="auth-panel">
      <div class="auth-card">
        <h2>Вхід до адмінки</h2>
        <p>Введіть email та пароль адміністратора.</p>
        <form id="loginForm">
          <label for="email">Email</label>
          <input id="email" type="email" required placeholder="admin@masyanya.example">

          <label for="password">Пароль</label>
          <input id="password" type="password" required placeholder="Введіть пароль">

          <button type="submit" class="button button-primary">Увійти</button>
          <div id="authError" class="auth-error hidden"></div>
        </form>
      </div>
    </section>

    <section id="adminPanel" class="admin-panel hidden">
      <div class="admin-top">
        <div class="admin-status">
          <p>Ви в адмін-панелі. Тут можна керувати товарами.</p>
        </div>
        <button id="logoutButton" class="button button-secondary">Вийти</button>
      </div>

      <div class="admin-grid">
        <div class="admin-card admin-form-card">
          <h2 id="formHeading">Додати новий товар</h2>
          <form id="productForm">
            <label for="productName">Назва</label>
            <input id="productName" type="text" required placeholder="Наприклад, Рожевий кулька">

            <label for="productPrice">Ціна, грн</label>
            <input id="productPrice" type="number" required min="1" placeholder="100">

            <label for="productStock">Кількість</label>
            <input id="productStock" type="number" required min="0" placeholder="10">

            <label for="productDescription">Опис</label>
            <textarea id="productDescription" rows="4" placeholder="Опис товару"></textarea>

            <label for="productImage">Фото</label>
            <input id="productImage" type="file" accept="image/*">
            <div class="image-preview hidden" id="imagePreviewWrapper">
              <img id="imagePreview" src="" alt="Попередній перегляд зображення">
            </div>

            <div class="form-actions">
              <button type="submit" class="button button-primary" id="saveButton">Зберегти</button>
              <button type="button" class="button button-secondary hidden" id="cancelEdit">Скасувати</button>
            </div>
          </form>
        </div>

        <div class="admin-card admin-list-card">
          <div class="list-header">
            <div>
              <h2>Товари</h2>
              <p>Натисніть на товар, щоб відредагувати або видалити.</p>
            </div>
            <div class="list-controls">
              <label for="adminSearch">Пошук</label>
              <input id="adminSearch" type="search" placeholder="За назвою...">
              <label for="adminSort">Сортування</label>
              <select id="adminSort">
                <option value="name">За назвою</option>
                <option value="priceAsc">Ціна ↑</option>
                <option value="priceDesc">Ціна ↓</option>
                <option value="stock">За наявністю</option>
              </select>
            </div>
          </div>

          <div id="productList" class="product-list"></div>
          <div id="adminEmpty" class="empty-state hidden">
            <div class="empty-card">
              <h2>Список товарів порожній</h2>
              <p>Додайте першу кульку через форму зліва.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
