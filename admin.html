<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Масяня</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="admin.js" defer></script>
</head>
<body>
  <header class="site-header admin-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">Панель управления</p>
        <h1>Масяня — админка</h1>
      </div>
      <a class="admin-link" href="index.html">На сайт</a>
    </div>
  </header>

  <main class="page-shell admin-shell">
    <section id="authPanel" class="auth-panel">
      <div class="auth-card">
        <h2>Вход в админ-панель</h2>
        <p>Введите email и пароль администратора.</p>
        <form id="loginForm">
          <label for="email">Email</label>
          <input id="email" type="email" required placeholder="admin@masyanya.example">

          <label for="password">Пароль</label>
          <input id="password" type="password" required placeholder="Введите пароль">

          <button type="submit" class="button button-primary">Войти</button>
          <div id="authError" class="auth-error hidden"></div>
        </form>
      </div>
    </section>

    <section id="adminPanel" class="admin-panel hidden">
      <div class="admin-top">
        <div class="admin-status">
          <p>Вы в админке. Здесь можно управлять товарами.</p>
        </div>
        <button id="logoutButton" class="button button-secondary">Выйти</button>
      </div>

      <div class="admin-grid">
        <div class="admin-card admin-form-card">
          <h2 id="formHeading">Добавить новый товар</h2>
          <form id="productForm">
            <label for="productName">Название</label>
            <input id="productName" type="text" required placeholder="Например, Розовый шарик">

            <label for="productPrice">Цена, грн</label>
            <input id="productPrice" type="number" required min="1" placeholder="100">

            <label for="productStock">Количество</label>
            <input id="productStock" type="number" required min="0" placeholder="10">

            <label for="productDescription">Описание</label>
            <textarea id="productDescription" rows="4" placeholder="Описание товара"></textarea>

            <label for="productImage">Фотография</label>
            <input id="productImage" type="file" accept="image/*">
            <div class="image-preview hidden" id="imagePreviewWrapper">
              <img id="imagePreview" src="" alt="Превью изображения">
            </div>

            <div class="form-actions">
              <button type="submit" class="button button-primary" id="saveButton">Сохранить</button>
              <button type="button" class="button button-secondary hidden" id="cancelEdit">Отмена</button>
            </div>
          </form>
        </div>

        <div class="admin-card admin-list-card">
          <div class="list-header">
            <div>
              <h2>Товары</h2>
              <p>Нажмите на товар, чтобы отредактировать или удалить.</p>
            </div>
            <div class="list-controls">
              <label for="adminSearch">Поиск</label>
              <input id="adminSearch" type="search" placeholder="По названию...">
              <label for="adminSort">Сортировка</label>
              <select id="adminSort">
                <option value="name">По названию</option>
                <option value="priceAsc">Цена ↑</option>
                <option value="priceDesc">Цена ↓</option>
                <option value="stock">По наличию</option>
              </select>
            </div>
          </div>

          <div id="productList" class="product-list"></div>
          <div id="adminEmpty" class="empty-state hidden">
            <div class="empty-card">
              <h2>Список товаров пуст</h2>
              <p>Добавьте первый шарик через форму слева.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
