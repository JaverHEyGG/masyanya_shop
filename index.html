<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Масяня — магазин кульок</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">Інтернет-магазин повітряних кульок</p>
        <h1>Масяня</h1>
        <p class="hero-text">Яскраві кульки для свята та особливих моментів.</p>
      </div>
      <a class="admin-link" href="admin.html">Адмінка</a>
    </div>
  </header>

  <main class="page-shell">
    <section class="controls">
      <div class="search-wrap">
        <label for="search">Пошук</label>
        <input id="search" type="search" placeholder="За назвою...">
      </div>
      <div class="sort-wrap">
        <label for="sort">Сортування</label>
        <select id="sort">
          <option value="name">За назвою</option>
          <option value="priceAsc">Ціна ↑</option>
          <option value="priceDesc">Ціна ↓</option>
          <option value="stock">За наявністю</option>
        </select>
      </div>
    </section>

    <section id="products" class="grid"></section>

    <section id="emptyState" class="empty-state hidden">
      <div class="empty-card">
        <h2>Товари ще не додані</h2>
        <p>Перейдіть до адмін-панелі, щоб додати перші кульки.</p>
      </div>
    </section>
  </main>

  <div id="productModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-card">
      <button class="modal-close" id="modalClose" type="button" aria-label="Закрити">×</button>
      <img id="modalImage" src="" alt="Фото товару">
      <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <div class="modal-meta">
          <span id="modalPrice"></span>
          <span id="modalStock"></span>
        </div>
        <p id="modalDescription"></p>
      </div>
    </div>
  </div>
</body>
</html>
